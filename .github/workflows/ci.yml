name: NeuroKey CI (Fedora)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    steps:
    - name: Install System Dependencies
      run: |
        dnf install -y \
          git \
          nodejs \
          npm \
          rust \
          cargo \
          gcc \
          gcc-c++ \
          make \
          pkgconf-pkg-config \
          openssl-devel \
          webkit2gtk4.1-devel \
          libappindicator-gtk3-devel \
          librsvg2-devel \
          libsoup3-devel \
          gtk3-devel \
          pango-devel \
          cairo-devel \
          gdk-pixbuf2-devel \
          glib2-devel

    - uses: actions/checkout@v4

    - name: Install Frontend Dependencies
      run: npm install

    - name: Frontend Build
      run: npm run build

    - name: Rust Check
      run: cargo check --manifest-path src-tauri/Cargo.toml

    - name: Rust Test
      run: cargo test --manifest-path src-tauri/Cargo.toml

    - name: Maintain Error Logs
      if: failure()
      run: |
        echo "### Fedora Build Failure Detected" > error_log.txt
        echo "Timestamp: $(date)" >> error_log.txt
        echo "Check the GitHub Actions logs for the full DNF or Cargo trace." >> error_log.txt
